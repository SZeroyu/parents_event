<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대박 은행</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./font/font.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="./script.js"></script>
</head>
<body>
    <div class="content">
        <div class="con1">
            <h2 class="main_color">환영합니다</h2>
            <h3>어버이날 <span class="main_color">용돈 이벤트</span>에 <br>
                <span class="main_color">당첨</span>되신 것을 축하드립니다!
            </h3>
            <div class="out_btn"><p>출금하기</p></div>
        </div>
        <div class="con2 dpnone">
            <div class="pwd_input">
                <h2 class="tit">비밀번호 입력</h2>
                 <ul class="pw_star">
                    <li><span class="dpnone">*</span></li>
                    <li><span class="dpnone">*</span></li>
                    <li><span class="dpnone">*</span></li>
                    <li><span class="dpnone">*</span></li>
                </ul>
                <div class="pw_text"></div>
                <input type="text" name="in_pwd" id="in_pwd" class="pw dpnone" >
            </div>
                <div class="keypad">
                <button value="1" class="keypad_num">1</button>
                <button value="2" class="keypad_num">2</button>
                <button value="3" class="keypad_num">3</button>
                <button value="4" class="keypad_num">4</button>
                <button value="5" class="keypad_num">5</button>
                <button value="6" class="keypad_num">6</button>
                <button value="7" class="keypad_num">7</button>
                <button value="8" class="keypad_num">8</button>
                <button value="9" class="keypad_num">9</button>
                <button value="삭제" class="del_btn">삭제</button>
                <button value="0" class="keypad_num">0</button>
                <button value="확인" class="main_btn">확인</button>
                </div>
        </div>
        <div class="con3 dpnone">
            <div class="icon_box"></div>
            <h3><span class="main_color">본인 인증</span>이 <br>완료되었습니다.</h3>
        </div>
        <div class="con4 dpnone">
            <ul class="gif_box">
                <li><img src="./img/card_before.png" alt="카드 넣기 전"></li>
                <li><img src="./img/card_after.png" alt="카드 넣은 후"></li>
            </ul>
            <h3>화면과 같이 카드를 <br> 넣어 주세요</h3>
        </div>
        <div class="con5 dpnone">
            <div class="tit">
                <h3 class=" main_color">출금 중</h3>
                <p class="sub_tit"> 조금만 기다려 주세요</p>
            </div>
            <ul class="bar_box">
                <li class="bar_bg"></li>
                <li class="bar_main"></li>
            </ul>
        </div>
        <div class="con6 dpnone">
            <h3 class="main_color">출금 완료 되었습니다!</h3>
        </div>
    </div>
</body>
</html>
